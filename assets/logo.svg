<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="58" stroke="url(#logoGrad)" stroke-width="2" fill="#0A0A0F" opacity="0.9"/>
  <!-- Inner circle -->
  <circle cx="64" cy="64" r="46" fill="url(#innerGrad)" stroke="rgba(0,240,255,0.25)" stroke-width="1"/>
  <!-- Play triangle (Tube reference) -->
  <polygon points="53,42 88,64 53,86" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Stylized "S" (Sage) -->
  <path d="M72 55 L60 55 C58 55 56 56 56 58 C56 61 61 63 67 65 C73 67 78 69 78 73 C78 76 75 79 72 79 L57 79" fill="none" stroke="#FF00FF" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Bottom dots (wisdom/sage) -->
  <circle cx="53" cy="93" r="2" fill="#00F0FF" opacity="0.6"/>
  <circle cx="64" cy="93" r="2" fill="#FF00FF" opacity="0.4"/>
  <circle cx="75" cy="93" r="2" fill="#00F0FF" opacity="0.6"/>
</svg>
